services:
  - type: web
    name: totalhealthy-ai
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:10000 --timeout 120 --workers 1 --log-level info
    envVars:
      - key: OPENROUTER_API_KEY
        sync: false
      - key: PORT
        value: "10000"
    healthCheckPath: /
